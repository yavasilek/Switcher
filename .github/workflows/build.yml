name: Сборка

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Сборка Windows x64
    runs-on: windows-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Восстановить зависимости
        run: dotnet restore

      - name: Собрать проект
        run: dotnet build -c Release --no-restore

      - name: Опубликовать один exe-файл
        run: >
          dotnet publish -c Release -r win-x64 -o .\publish\win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Самопроверка
        shell: pwsh
        run: |
          $exe = Join-Path $PWD 'publish\win-x64\Switcher.exe'
          $p = Start-Process -FilePath $exe -ArgumentList '--self-test' -Wait -PassThru -WindowStyle Hidden
          if ($p.ExitCode -ne 0) {
            exit $p.ExitCode
          }

      - name: Загрузить exe как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: Switcher-win-x64
          path: publish/win-x64/Switcher.exe
          if-no-files-found: error
