name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Publish Windows x64 release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish single-file exe
        run: >
          dotnet publish -c Release -r win-x64 -o .\publish\win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Self-test
        shell: pwsh
        run: |
          $exe = Join-Path $PWD 'publish\win-x64\Switcher.exe'
          $p = Start-Process -FilePath $exe -ArgumentList '--self-test' -Wait -PassThru -WindowStyle Hidden
          if ($p.ExitCode -ne 0) {
            exit $p.ExitCode
          }

      - name: Create checksum
        shell: pwsh
        run: |
          $exe = Join-Path $PWD 'publish\win-x64\Switcher.exe'
          $hash = Get-FileHash -Algorithm SHA256 $exe
          "$($hash.Hash.ToLowerInvariant())  Switcher.exe" | Set-Content -Encoding ascii .\publish\win-x64\Switcher.exe.sha256

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release create $tag `
            ".\publish\win-x64\Switcher.exe#Switcher-win-x64.exe" `
            ".\publish\win-x64\Switcher.exe.sha256#Switcher-win-x64.exe.sha256" `
            --title $tag `
            --notes "Windows x64 single-file build of Switcher."
